    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: cursive;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #000730;
        }

        .box2 {
            background: #a1a90e;
            padding: 100px;
            border-radius: 25px;
        }

        button {
            padding: 20px;
            margin: 25px;
            background: #00041c;
            border: none;
            outline: none;
            border-radius: 30px;
            transition: 0.5s;
        }

        button a {
            font-size: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            
        }

        button:hover {
            background: #000000bb;
        }
        
    </style>
